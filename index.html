        "mainEntity": [
          {
            "@type": "Question",
            "name": "מהו בעצם הליך החזר מס?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "במהלך השנים ייתכן ששילמתם למס הכנסה יותר מהנדרש – ובמקרה כזה, אתם זכאים להחזר כספי על ההפרש. הליך החזר המס נועד לבדוק אם קיימת זכאות, לחשב את גובה ההחזר ולהגיש לרשות המסים בקשה למימושו."
            }
          },
          {
            "@type": "Question",
            "name": "למי מגיע החזרי מס הכנסה?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "כל מי ששילם מס מעל לנדרש – עקב טעויות בדיווח, שינויי תעסוקה, סטטוס משפחתי או בריאותי, הטבות מס שלא נוצלו ועוד – זכאי/ת להחזר מס. ישנן עשרות סיבות לזכאות, ולכן שווה לבדוק!"
            }
          },
          {
            "@type": "Question",
            "name": "איך מקבלים את החזר המס?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "מימוש החזר המס מתבצע ע״י הגשת בקשת החזר לרשות המסים. ב-REFOUNDIT אנו מנהלים עבורכם את בקשת ההחזר. ברגע שהבקשה מאושרת, הכסף מופקד ישירות לחשבון הבנק שלכם."
            }
          },
          {
            "@type": "Question",
            "name": "מה אם יתברר שאני חייב/ת למס הכנסה?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "אל דאגה – אנו מבצעים בדיקה מקדימה, מקצועית ויסודית, שמטרתה לבדוק אם קיימת זכאות להחזר או סיכון לחוב. רק אם מתברר שמגיע לכם החזר – אתם מחליטים אם להתקדם."
            }
          },
          {
            "@type": "Question",
            "name": "תוך כמה זמן מקבלים את ההחזר?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "ברוב המקרים, ההחזר יגיע תוך מספר חודשים מרגע הגשת הבקשה. אנו דואגים להגשה מדויקת ומקצועית כדי לקצר את זמני הטיפול ככל הניתן."
            }
          },
          {
            "@type": "Question",
            "name": "האם אפשר לבקש החזר רטרואקטיבית?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "בהחלט! אפשר להגיש בקשה להחזר מס עבור שש השנים האחרונות – גם אם לא בדקתם עד היום."
            }
          },
          {
            "@type": "Question",
            "name": "כמה עולה השירות?",

              "@type": "Answer",
              "text": "בדיקת הזכאות היא בחינם וללא התחייבות. דמי טיפול נגבים רק במידה ונמצא החזר ואתם בוחרים להתקדם למימוש."
            }
          }
        ]
